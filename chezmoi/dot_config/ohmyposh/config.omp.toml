version = 3

[[blocks]]
type = "prompt"
alignment = "left"

  [[blocks.segments]]
  type = "text"
  style = "plain"
  foreground = "#11111b"
  background = "#89b4fa"
  template = " OMP "

  [[blocks.segments]]
  type = "path"
  style = "plain"
  foreground = "#89b4fa"
  template = " {{ .Path }} "

  [[blocks.segments]]
  type = "git"
  style = "plain"
  foreground = "#a6e3a1"
  template = " {{ .HEAD }}{{ if .Working.Changed }}*{{ end }} "

[[blocks]]
type = "prompt"
alignment = "right"

  [[blocks.segments]]
  type = "executiontime"
  style = "plain"
  foreground = "#f9e2af"
  template = "{{ .FormattedMs }} "

[[blocks]]
type = "prompt"
alignment = "left"
newline = true

  [[blocks.segments]]
  type = "text"
  style = "plain"
  foreground = "#cba6f7"
  template = "> "
