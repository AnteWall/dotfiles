---
- name: Bootstrap local machine
  hosts: localhost
  gather_facts: true
  become: false
  vars_files:
    - ../group_vars/all.yml
  vars_prompt:
    - name: sudo_password
      prompt: "Enter sudo password (for pkg installers, leave empty to skip)"
      private: true
      default: ""

  roles:
    - role: common
    - role: linux
      when: ansible_facts['system'] == "Linux"
    - role: macos
      when: ansible_facts['system'] == "Darwin"
