---
# Cross-platform defaults. Update these to match your tools.

common_packages:
  - git
  - curl
  - unzip

linux_packages:
  - build-essential
  - zsh
  - ghostty

homebrew_taps:
  - anomalyco/tap
  - oven-sh/bun
  - FelixKratz/formulae
  - asmvik/formulae

linux_brew_packages:
  - anomalyco/tap/opencode
  - bash
  - fnm
  - neovim
  - oh-my-posh
  - tree-sitter-cli
  - 1password-cli
  - uv
  - oven-sh/bun/bun
  - gcloud-cli
  - lazygit
  - git-delta
  - gofumpt

macos_brew_packages:
  - git
  - curl
  - zsh
  - bash
  - fnm
  - neovim
  - anomalyco/tap/opencode
  - oh-my-posh
  - tree-sitter-cli
  - 1password-cli
  - uv
  - python@3.13
  - oven-sh/bun/bun
  - lazygit
  - git-delta
  - gofumpt
  - lua
  - sketchybar
  - asmvik/formulae/yabai
  - asmvik/formulae/skhd
  - borders

macos_cask_packages:
  - gcloud-cli
  - ghostty
  - font-hack-nerd-font
  - font-sketchybar-app-font

# Casks that require sudo (pkg installers)
macos_cask_sudo_packages:
  - font-sf-pro
  - sf-symbols

oh_my_posh_install_font: true
oh_my_posh_font: meslo

go_version: "1.26.0"

rustup_default_toolchain: stable
rustup_profile: default

fnm_node_version: "25.6.1"
