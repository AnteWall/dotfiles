---
- name: Check for Homebrew in Apple Silicon location
  ansible.builtin.stat:
    path: /opt/homebrew/bin/brew
  register: brew_opt

- name: Check for Homebrew in Intel macOS location
  ansible.builtin.stat:
    path: /usr/local/bin/brew
  register: brew_usr_local

- name: Install Homebrew if missing
  ansible.builtin.shell:
    cmd: NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  when: not brew_opt.stat.exists and not brew_usr_local.stat.exists

- name: Set Homebrew prefix fact on macOS
  ansible.builtin.set_fact:
    macos_homebrew_prefix: "{{ '/opt/homebrew' if brew_opt.stat.exists else '/usr/local' }}"

- name: Ensure Homebrew taps are configured on macOS
  community.general.homebrew_tap:
    name: "{{ homebrew_taps | default([]) }}"
    state: present
  when: homebrew_taps | default([]) | length > 0
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Ensure Homebrew formula packages are installed
  community.general.homebrew:
    name: "{{ macos_brew_packages | default([]) }}"
    state: present
  when: macos_brew_packages | default([]) | length > 0
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Ensure python3 shim exists for gcloud-cli installer
  ansible.builtin.file:
    src: "{{ macos_homebrew_prefix }}/opt/python@3.13/libexec/bin/python"
    dest: "{{ macos_homebrew_prefix }}/opt/python@3.13/libexec/bin/python3"
    state: link
    force: false
  when:
    - "'gcloud-cli' in (macos_cask_packages | default([]))"
    - "'python@3.13' in (macos_brew_packages | default([]))"

- name: Check installed fnm Node.js versions on macOS
  ansible.builtin.command:
    cmd: fnm list
  register: fnm_macos_installed_versions
  changed_when: false
  when: "'fnm' in (macos_brew_packages | default([]))"
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Install configured Node.js version with fnm on macOS
  ansible.builtin.command:
    cmd: "fnm install {{ fnm_node_version }}"
  when:
    - "'fnm' in (macos_brew_packages | default([]))"
    - "('v' ~ fnm_node_version) not in (fnm_macos_installed_versions.stdout | default(''))"
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Check current fnm default Node.js version on macOS
  ansible.builtin.command:
    cmd: fnm default
  register: fnm_macos_default_version
  changed_when: false
  failed_when: false
  when: "'fnm' in (macos_brew_packages | default([]))"
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Set configured Node.js version as fnm default on macOS
  ansible.builtin.command:
    cmd: "fnm default {{ fnm_node_version }}"
  when:
    - "'fnm' in (macos_brew_packages | default([]))"
    - fnm_macos_default_version.rc | default(1) != 0 or ((fnm_macos_default_version.stdout | default('') | trim) not in [fnm_node_version, 'v' ~ fnm_node_version])
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Ensure Homebrew cask packages are installed
  community.general.homebrew_cask:
    name: "{{ macos_cask_packages | default([]) }}"
    state: present
    accept_external_apps: true
  when: macos_cask_packages | default([]) | length > 0
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Ensure Homebrew cask packages requiring sudo are installed
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
    sudo_password: "{{ sudo_password }}"
  loop: "{{ macos_cask_sudo_packages | default([]) }}"
  when:
    - macos_cask_sudo_packages | default([]) | length > 0
    - sudo_password | default('') | length > 0
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Start SketchyBar service via Homebrew
  ansible.builtin.command:
    cmd: brew services start sketchybar
  register: sketchybar_service
  changed_when: "'Successfully started' in sketchybar_service.stdout"
  failed_when: false
  when: "'sketchybar' in (macos_brew_packages | default([]))"
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Check if yabai scripting addition is installed
  ansible.builtin.stat:
    path: /Library/ScriptingAdditions/yabai.osax
  register: yabai_scripting_addition
  when: "'asmvik/formulae/yabai' in (macos_brew_packages | default([]))"

- name: Install yabai scripting addition
  ansible.builtin.command:
    cmd: "{{ macos_homebrew_prefix }}/bin/yabai --install-sa"
  become: true
  vars:
    ansible_become_password: "{{ sudo_password }}"
  when:
    - "'asmvik/formulae/yabai' in (macos_brew_packages | default([]))"
    - sudo_password | default('') | length > 0
    - not (yabai_scripting_addition.stat.exists | default(false))

- name: Allow yabai to load scripting addition without password
  ansible.builtin.copy:
    dest: /etc/sudoers.d/yabai
    content: "{{ ansible_facts['user_id'] }} ALL=(root) NOPASSWD: {{ macos_homebrew_prefix }}/bin/yabai --load-sa\n"
    owner: root
    group: wheel
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
  become: true
  vars:
    ansible_become_password: "{{ sudo_password }}"
  when:
    - "'asmvik/formulae/yabai' in (macos_brew_packages | default([]))"
    - sudo_password | default('') | length > 0

- name: Load yabai scripting addition
  ansible.builtin.command:
    cmd: "{{ macos_homebrew_prefix }}/bin/yabai --load-sa"
  become: true
  vars:
    ansible_become_password: "{{ sudo_password }}"
  changed_when: false
  failed_when: false
  when:
    - "'asmvik/formulae/yabai' in (macos_brew_packages | default([]))"
    - sudo_password | default('') | length > 0

- name: Start yabai service
  ansible.builtin.command:
    cmd: yabai --start-service
  register: yabai_service
  changed_when: yabai_service.rc == 0
  failed_when: false
  when: "'asmvik/formulae/yabai' in (macos_brew_packages | default([]))"
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Start skhd service
  ansible.builtin.command:
    cmd: skhd --start-service
  register: skhd_service
  changed_when: skhd_service.rc == 0
  failed_when: false
  when: "'asmvik/formulae/skhd' in (macos_brew_packages | default([]))"
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Start JankyBorders service via Homebrew
  ansible.builtin.command:
    cmd: brew services start borders
  register: borders_service
  changed_when: "'Successfully started' in borders_service.stdout"
  failed_when: false
  when: "'borders' in (macos_brew_packages | default([]))"
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Check if SbarLua module is installed
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/share/sketchybar_lua/sketchybar.so"
  register: sbarlua_module
  when: "'sketchybar' in (macos_brew_packages | default([]))"

- name: Clone and build SbarLua module for Lua-based sketchybar config
  ansible.builtin.shell:
    cmd: |
      set -e
      TMPDIR=$(mktemp -d)
      git clone https://github.com/FelixKratz/SbarLua.git "$TMPDIR"
      cd "$TMPDIR"
      make install
      rm -rf "$TMPDIR"
  when:
    - "'sketchybar' in (macos_brew_packages | default([]))"
    - not (sbarlua_module.stat.exists | default(false))
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Check if Spotify is installed
  ansible.builtin.stat:
    path: /Applications/Spotify.app/Contents/Resources
  register: spotify_app

- name: Ensure Spicetify Catppuccin theme directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/spicetify/Themes"
    state: directory
    mode: "0755"
  when:
    - "'spicetify-cli' in (macos_brew_packages | default([]))"
    - spotify_app.stat.exists

- name: Ensure Spicetify Catppuccin source directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/share"
    state: directory
    mode: "0755"
  when:
    - "'spicetify-cli' in (macos_brew_packages | default([]))"
    - spotify_app.stat.exists

- name: Fetch Catppuccin theme for Spicetify
  ansible.builtin.git:
    repo: https://github.com/catppuccin/spicetify
    dest: "{{ ansible_facts['env']['HOME'] }}/.local/share/catppuccin-spicetify"
    depth: 1
    update: true
  when:
    - "'spicetify-cli' in (macos_brew_packages | default([]))"
    - spotify_app.stat.exists

- name: Install Catppuccin theme for Spicetify
  ansible.builtin.copy:
    src: "{{ ansible_facts['env']['HOME'] }}/.local/share/catppuccin-spicetify/catppuccin/"
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/spicetify/Themes/catppuccin/"
    remote_src: true
    mode: preserve
  when:
    - "'spicetify-cli' in (macos_brew_packages | default([]))"
    - spotify_app.stat.exists

- name: Configure Spicetify Catppuccin Mocha theme
  ansible.builtin.command:
    cmd: "{{ item }}"
  loop:
    - spicetify config spotify_path /Applications/Spotify.app/Contents/Resources
    - spicetify config current_theme catppuccin
    - spicetify config color_scheme mocha
    - spicetify config inject_css 1 inject_theme_js 1 replace_colors 1 overwrite_assets 1
    - spicetify backup apply
  changed_when: false
  failed_when: false
  when:
    - "'spicetify-cli' in (macos_brew_packages | default([]))"
    - spotify_app.stat.exists
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Check if Oh My Posh font is already installed on macOS
  ansible.builtin.find:
    paths: "{{ ansible_facts['env']['HOME'] }}/Library/Fonts"
    patterns: "*{{ oh_my_posh_font | default('meslo') | capitalize }}*"
    file_type: file
  register: oh_my_posh_macos_font_files
  when: oh_my_posh_install_font | default(true)

- name: Install Oh My Posh font on macOS
  ansible.builtin.command:
    cmd: "oh-my-posh font install {{ oh_my_posh_font | default('meslo') }}"
  when:
    - oh_my_posh_install_font | default(true)
    - oh_my_posh_macos_font_files.matched | default(0) == 0
  environment:
    PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"
